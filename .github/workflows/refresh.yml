# Daily public refresh — FREE, no LLM, no secrets.
# Runs the pure-Python `collect` (seeds/RSS/GitHub) and commits the regenerated
# site so GitHub Pages redeploys. The LLM discovery step does NOT run here (it needs
# a paid API key); that stays local on the Mac via `claude -p` and pushes its finds.
name: refresh

on:
  schedule:
    - cron: "17 6 * * *"      # daily 06:17 UTC
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: write              # to commit the refreshed catalog back to the repo

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Collect + regenerate site
        run: freeyolo collect
      - name: Commit refreshed catalog
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A site RESOURCES.md data/resources.db data/metrics.json data/metrics-history.csv
          git diff --cached --quiet || git commit -m "chore: scheduled catalog refresh [skip ci]"
          git pull --rebase --autostash || true
          git push
